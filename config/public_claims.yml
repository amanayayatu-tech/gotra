version: gotra.public_claims.v1
owner: gotra
evidence_layer: local checks
product_positioning:
  zh: "可审计 AI 金融研究发布账本"
  en: "Auditable AI financial research publication ledger"
allowed_public_claims:
  - zh: "GOTRA 记录研究任务、证据、分歧、反证、复盘与审计状态。"
    en: "GOTRA records research tasks, evidence, disagreements, counter-evidence, reviews, and audit state."
  - zh: "GOTRA 提供公开安全的研究信息和可复核的研究过程。"
    en: "GOTRA provides public-safe research information and a reviewable research process."
  - zh: "GOTRA 展示数据缺口、需要复核项、红队质疑和未解决问题。"
    en: "GOTRA shows data gaps, review items, red-team critiques, and unresolved questions."
  - zh: "GOTRA 的 Alaya 仅指 repo 内部 cognition flywheel / knowledge memory / feedback / readback state。"
    en: "GOTRA Alaya only means repo-internal cognition flywheel, knowledge memory, feedback, and readback state."
  - zh: "GOTRA 的测试、smoke、pressure、beta 和 formal acceptance 必须分层报告。"
    en: "GOTRA tests, smoke evidence, pressure runs, beta, and formal acceptance must be reported as separate evidence layers."
required_boundary_claims:
  - zh: "不是投资建议。"
    en: "Not investment advice."
  - zh: "不是交易信号。"
    en: "Not a trading signal."
  - zh: "不提供买入、卖出、持有、加仓、减仓指令。"
    en: "No buy, sell, hold, add, or reduce-position instructions."
  - zh: "不提供目标价或仓位建议。"
    en: "No target price or position sizing."
  - zh: "不承诺收益，不构成业绩证明。"
    en: "No return promise and no performance proof."
  - zh: "不构成科学或公共有效性证明。"
    en: "No scientific or public-validity proof."
  - zh: "不是自动交易或券商下单系统。"
    en: "Not an automated trading or broker execution system."
blocked_public_claims:
  - "荐股"
  - "AI 荐股"
  - "AI 选股"
  - "交易信号"
  - "买入建议"
  - "卖出建议"
  - "持有建议"
  - "目标价"
  - "仓位建议"
  - "必涨"
  - "稳赚"
  - "收益承诺"
  - "收益保证"
  - "稳定收益"
  - "稳定 alpha"
  - "alpha 已验证"
  - "跑赢市场"
  - "自动交易"
  - "AI hedge fund"
  - "hedge fund"
  - "业绩证明"
  - "科学或公共有效性证明"
public_payload_forbidden:
  - "API key"
  - "Authorization"
  - "Bearer token"
  - "raw provider I/O"
  - "完整内部 prompt"
  - "私有路径"
handling_policy:
  blocklist_match: "[BLOCKED: 合规禁词]"
  reader_path: "Use reader-safe wording first; keep raw fields only in audit details."
  evidence_layers_zh: ["本地检查", "冒烟证据", "生产冒烟检查", "长跑或正式验收", "科学或公共有效性声明"]
